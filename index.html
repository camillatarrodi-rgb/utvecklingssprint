<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getDatabase,
  ref,
  push
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCB-okFdEpQ58APMeLSrricPGgbUx3uOd0",
  authDomain: "utvecklingssprintar.firebaseapp.com",
  databaseURL: "https://utvecklingssprintar-default-rtdb.firebaseio.com",
  projectId: "utvecklingssprintar",
  storageBucket: "utvecklingssprintar.firebasestorage.app",
  messagingSenderId: "1040641301479",
  appId: "1:1040641301479:web:c68b975c0417c14e57fb42"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const STORAGE_KEY = "tema-kompetens-data-v3";

const categories = [
{
title: "Tidiga skeden",
className: "early",
prefix: "1",
themes: [
{
title: "AI agenter för automatisk inhämtning av data",
desc: "Hur kan vi med hjälp av AI agenter..."
},
{
title: "Automatiserad granskning av lagar...",
desc: "Hur kan vi automatisera granskning..."
},
{
title: "Tidig fastighetsekonomisk jämförelse",
desc: "Hur kan vi uppskatta..."
}
]
},
{
title: "Återbruk",
className: "reuse",
prefix: "2",
themes: [
{
title: "Parallell design med och utan återbruk",
desc: "Hur kan vi snabbt jämföra..."
},
{
title: "Behålla flexibilitet...",
desc: "Hur kan vi arbeta..."
},
{
title: "Matchning mellan design...",
desc: "Hur kan vi matcha..."
}
]
}
];

const flatThemes = categories.flatMap(category =>
category.themes.map((theme, index) => ({
...theme,
category: category.title,
className: category.className,
number: `${category.prefix}${String.fromCharCode(97 + index)}`
}))
);

let peopleByTheme = flatThemes.map(() => []);

function saveData() {
localStorage.setItem(STORAGE_KEY, JSON.stringify({ peopleByTheme }));
}

function loadData() {
const saved = localStorage.getItem(STORAGE_KEY);
if (!saved) return;
const parsed = JSON.parse(saved);
if (parsed.peopleByTheme) peopleByTheme = parsed.peopleByTheme;
}

function createThemes() {
const area = document.getElementById("theme-area");
area.innerHTML = "";

flatThemes.forEach((theme, i) => {
const card = document.createElement("div");

card.innerHTML = `
<h3>${theme.number} ${theme.title}</h3>
<input id="name-${i}" placeholder="Namn">
<input id="company-${i}" placeholder="Företag">
<input id="email-${i}" placeholder="E-post">
<button onclick="savePerson(${i})">Spara anmälan</button>
<ul id="list-${i}"></ul>
`;

area.appendChild(card);

renderPeople(i);
});
}

window.savePerson = async function(themeIndex) {
const name = document.getElementById(`name-${themeIndex}`).value;
const company = document.getElementById(`company-${themeIndex}`).value;
const email = document.getElementById(`email-${themeIndex}`).value;

if (!name || !email) {
alert("Fyll i namn och e-post");
return;
}

const theme = flatThemes[themeIndex];

const person = {
name,
company,
email,
theme: theme.title,
time: new Date().toISOString()
};

peopleByTheme[themeIndex].push(person);

await push(ref(db, "pilotval"), person);

saveData();
renderPeople(themeIndex);

alert("Sparat!");
};

function renderPeople(index) {
const list = document.getElementById(`list-${index}`);
list.innerHTML = "";

peopleByTheme[index].forEach(p => {
const li = document.createElement("li");
li.textContent = `${p.name} (${p.company})`;
list.appendChild(li);
});
}

loadData();
createThemes();
</script>
