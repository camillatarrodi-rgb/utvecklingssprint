<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temaval och kompetenser</title>
  <style>
    :root {
      --muted: #6b7280;
      --pink-bg: #fde7f1; --pink-text: #c21872;
      --yellow-bg: #fff3bd; --orange-text: #d86b00;
    }
    body {margin:0;font-family:system-ui;background:url("bakgrund.png") center/cover fixed;}
    header{text-align:center;color:white;padding:40px}
    main{max-width:1100px;margin:auto;padding:20px}
    .category-title{padding:12px;border-radius:16px;margin:10px 0}
    .early{background:var(--pink-bg);color:var(--pink-text)}
    .reuse{background:var(--yellow-bg);color:var(--orange-text)}
    .themes{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
    .theme-card{padding:14px;border-radius:16px;background:rgba(255,255,255,0.9)}
    .theme-card.early{background:var(--pink-bg)}
    .theme-card.reuse{background:var(--yellow-bg)}
    .theme-subtitle{font-size:0.85rem;color:var(--muted);margin-bottom:10px}
    input{width:100%;margin:5px 0;padding:8px}
    button{padding:6px 10px;margin-top:6px;cursor:pointer}
    .skills{margin-top:20px}
    .tag{display:inline-block;padding:6px 10px;border:1px solid #ccc;border-radius:20px;margin:4px;cursor:pointer;background:#fff}
  </style>
</head>
<body>
<header>
<h1>Välj tema och kompetenser</h1>
</header>
<main>
<div id="themes"></div>

<div class="skills">
<h3>Kompetenser</h3>
<div id="skill-tags"></div>
</div>
</main>

<script>
const categories = [
  {
    title: "Tidiga skeden",
    className: "early",
    prefix: "1",
    themes: [
      {title:"AI agenter för automatisk inhämtning av data",desc:"Hur kan vi med hjälp av AI agenter på ett effektivt sätt samla in underlag såsom DP-karta, fastighetsvärden över tid, buller, luftkvalitet, trafikflöden osv..."},
      {title:"Automatiserad granskning av lagar, regler och styrdokument",desc:"Hur kan vi automatisera granskning av handlingar i tidiga skeden?"},
      {title:"Tidig fastighetsekonomisk jämförelse",desc:"Hur kan vi uppskatta och jämföra fastighetsekonomiska konsekvenser för 2–3 designalternativ i tidiga skeden så att val av huvudkoncept kan göras på mer informerad grund?"}
    ]
  },
  {
    title: "Återbruk",
    className: "reuse",
    prefix: "2",
    themes: [
      {title:"Parallell design med och utan återbruk",desc:"Hur kan vi snabbt jämföra ett designförslag med och utan återbruk i tidiga skeden så att konsekvenser för kostnad, klimat och gestaltning blir tydliga?"},
      {title:"Behålla flexibilitet genom designprocess och projektering",desc:"Hur kan vi arbeta med skarpa designförslag och samtidigt behålla flexibilitet i måttsättning, material och val av produkt?"},
      {title:"Matchning mellan design och tillgängligt återbruksmaterial",desc:"Hur kan vi matcha ett tidigt designförslag med tillgängliga återbruksmaterial så att arkitekten kan testa vad som är möjligt utan att låsa lösningen?"}
    ]
  }
];

const skills = [
  "Klimatberäkning/LCA",
  "Affärsmodeller",
  "Parametrisk design",
  "Tidiga skeden",
  "Vibe coding",
  "BIM"
];

function createThemes(){
  const container = document.getElementById("themes");
  container.innerHTML="";

  categories.forEach(cat=>{
    const section=document.createElement("div");

    const title=document.createElement("h2");
    title.className=`category-title ${cat.className}`;
    title.textContent=cat.title;
    section.appendChild(title);

    const grid=document.createElement("div");
    grid.className="themes";

    cat.themes.forEach((t,i)=>{
      const letter = String.fromCharCode(97+i); // a,b,c
      const card=document.createElement("div");
      card.className=`theme-card ${cat.className}`;
      card.innerHTML=`
        <h3>${cat.prefix}${letter}. ${t.title}</h3>
        <div class="theme-subtitle">${t.desc}</div>
        <input placeholder="Namn" />
        <input placeholder="Företag" />
        <button>Spara</button>
      `;
      grid.appendChild(card);
    });

    section.appendChild(grid);
    container.appendChild(section);
  });
}

function createSkills(){
  const container=document.getElementById("skill-tags");
  skills.forEach(s=>{
    const span=document.createElement("span");
    span.className="tag";
    span.textContent=s;
    container.appendChild(span);
  });
}

createThemes();
createSkills();
</script>
</body>
</html>
