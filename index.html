<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temaval och kompetenser</title>
  <style>
    :root {
      --bg: #f6f4ef;
      --card: rgba(255,255,255,0.88);
      --text: #1f2933;
      --muted: #6b7280; /* grå text */
      --border: rgba(255,255,255,0.45);
      --pink-bg: #fde7f1;
      --pink-text: #c21872;
      --yellow-bg: #fff3bd;
      --orange-text: #d86b00;
      --accent: #2f6f5e;
      --accent-soft: #e1f0ea;
      --danger: #a33a3a;
      --danger-soft: #f7e4e4;
      --shadow: 0 12px 30px rgba(0,0,0,0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      line-height: 1.45;
      background: linear-gradient(rgba(10,20,25,0.38), rgba(10,20,25,0.55)), url("bakgrund.png") center/cover fixed no-repeat;
      min-height: 100vh;
    }

    header {
      padding: 48px 20px 22px;
      text-align: center;
      color: white;
      text-shadow: 0 2px 12px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 5vw, 3.8rem);
      letter-spacing: -0.04em;
    }

    .intro {
      max-width: 820px;
      margin: 0 auto;
      font-size: 1.1rem;
    }

    main {
      max-width: 1240px;
      margin: 0 auto;
      padding: 20px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 22px;
      align-items: start;
    }

    .category {
      margin-bottom: 26px;
    }

    .category-title {
      margin: 0 0 12px;
      padding: 14px 18px;
      border-radius: 22px;
      font-size: 1.6rem;
      box-shadow: var(--shadow);
    }

    .category-title.early {
      background: var(--pink-bg);
      color: var(--pink-text);
    }

    .category-title.reuse {
      background: var(--yellow-bg);
      color: var(--orange-text);
    }

    .themes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
    }

    .theme-card, .skills-panel {
      background: var(--card);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .theme-card.early {
      background: rgba(253, 231, 241, 0.92);
      color: var(--pink-text);
    }

    .theme-card.reuse {
      background: rgba(255, 243, 189, 0.94);
      color: var(--orange-text);
    }

    .theme-card h3 { margin: 0 0 6px; font-size: 1.15rem; }

    /* NY: förklarande undertext */
    .theme-subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .theme-card.early .theme-subtitle { color: #8a4b6b; }
    .theme-card.reuse .theme-subtitle { color: #8a5b00; }

    label {
      display: block;
      margin-top: 10px;
      font-weight: 700;
      font-size: 0.9rem;
    }

    input[type="text"] {
      width: 100%;
      margin-top: 5px;
      padding: 10px 11px;
      border: 1px solid rgba(0,0,0,0.15);
      border-radius: 12px;
      font: inherit;
      background: rgba(255,255,255,0.86);
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 9px 12px;
      font: inherit;
      font-weight: 750;
      cursor: pointer;
    }

    .save-btn {
      width: 100%;
      margin-top: 12px;
      background: rgba(255,255,255,0.82);
      color: inherit;
      border: 1px solid rgba(0,0,0,0.12);
    }

    .remove-btn {
      background: var(--danger-soft);
      color: var(--danger);
      padding: 6px 9px;
      font-size: 0.85rem;
    }

    .people-list {
      list-style: none;
      padding: 0;
      margin: 14px 0 0;
      display: grid;
      gap: 10px;
    }

    .person {
      border: 1px dashed rgba(0,0,0,0.18);
      border-radius: 16px;
      padding: 12px;
      background: rgba(255,255,255,0.66);
      min-height: 92px;
    }

    .person-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .person-name { font-weight: 850; }
    .person-company { color: rgba(0,0,0,0.6); font-size: 0.9rem; }

    .person-skills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .assigned-skill {
      border-radius: 999px;
      background: #fff;
      padding: 4px 8px;
      font-size: 0.8rem;
      border: 1px solid rgba(0,0,0,0.12);
    }

    .skills-panel {
      position: sticky;
      top: 16px;
    }

    .skill-group { margin-top: 18px; }
    .skill-tags { display: flex; flex-wrap: wrap; gap: 8px; }

    .skill-tag {
      border: 1px solid rgba(0,0,0,0.14);
      border-radius: 999px;
      background: #fff;
      padding: 7px 10px;
      font-size: 0.85rem;
      cursor: grab;
    }

    @media (max-width: 940px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Välj tema och kompetenser</h1>
    <p class="intro">Anmäl dig till ett tema och dra sedan kompetenser till ditt namn.</p>
  </header>

  <main>
    <div class="layout">
      <section id="theme-area"></section>

      <aside class="skills-panel">
        <h2>Kompetenser</h2>
        <div class="skill-group">
          <div class="skill-tags" id="competence-skills"></div>
        </div>
      </aside>
    </div>
  </main>

<script>
const categories = [
  {
    title: "Tidiga skeden",
    className: "early",
    themes: [
      {
        title: "AI agenter för automatisk inhämtning av data",
        desc: "Hur kan vi med hjälp av AI agenter på ett effektivt sätt samla in underlag såsom DP-karta, fastighetsvärden över tid, buller, luftkvalitet, trafikflöden osv..."
      },
      {
        title: "Automatiserad granskning av lagar, regler och styrdokument",
        desc: "Hur kan vi automatisera granskning av handlingar i tidiga skeden?"
      },
      {
        title: "Tidig fastighetsekonomisk jämförelse",
        desc: "Hur kan vi uppskatta och jämföra fastighetsekonomiska konsekvenser för 2–3 designalternativ i tidiga skeden så att val av huvudkoncept kan göras på mer informerad grund?"
      }
    ]
  },
  {
    title: "Återbruk",
    className: "reuse",
    themes: [
      {
        title: "Parallell design med och utan återbruk",
        desc: "Hur kan vi snabbt jämföra ett designförslag med och utan återbruk i tidiga skeden så att konsekvenser för kostnad, klimat och gestaltning blir tydliga?"
      },
      {
        title: "Behålla flexibilitet genom designprocess och projektering",
        desc: "Hur kan vi arbeta med skarpa designförslag och samtidigt behålla flexibilitet i måttsättning, material och val av produkt?"
      },
      {
        title: "Matchning mellan design och tillgängligt återbruksmaterial",
        desc: "Hur kan vi matcha ett tidigt designförslag med tillgängliga återbruksmaterial så att arkitekten kan testa vad som är möjligt utan att låsa lösningen?"
      }
    ]
  }
];

function createThemes() {
  const area = document.getElementById("theme-area");
  area.innerHTML = "";

  categories.forEach(category => {
    const section = document.createElement("section");

    const heading = document.createElement("h2");
    heading.className = `category-title ${category.className}`;
    heading.textContent = category.title;
    section.appendChild(heading);

    const grid = document.createElement("div");
    grid.className = "themes";

    category.themes.forEach(theme => {
      const card = document.createElement("article");
      card.className = `theme-card ${category.className}`;

      card.innerHTML = `
        <h3>${theme.title}</h3>
        <div class="theme-subtitle">${theme.desc}</div>
        <label>Namn<input type="text" /></label>
        <label>Företag<input type="text" /></label>
        <button class="save-btn">Spara</button>
      `;

      grid.appendChild(card);
    });

    section.appendChild(grid);
    area.appendChild(section);
  });
}

createThemes();
</script>
</body>
</html>
